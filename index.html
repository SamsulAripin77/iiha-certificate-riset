<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>IIHA Certificate Template</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<div
		class="iiha-cert"
		style="--title-font-px: 56px; --name-font-px: 44px; --intro-font-px: 24px; --subject-font-px: 28px; --conducted-font-px: 20px; --hours-font-px: 20px;"
	>
		<img class="iiha-cert__bg" src="image.jpg" alt="Certificate Template">

		<div class="iiha-cert__layer iiha-cert__title"><span>CERTIFICATE OF COMPLETION</span></div>
		<div class="iiha-cert__layer iiha-cert__awarded"><span>This certificate is proudly awarded to :</span></div>
		<div class="iiha-cert__layer iiha-cert__name"><span>JOHN DOE</span></div>

		<div class="iiha-cert__event-stack">
			<div class="iiha-cert__event-line iiha-cert__intro"><span>for successfully completing the training program</span></div>
			<div class="iiha-cert__event-line iiha-cert__subject"><span>Occupational Health and Safety Fundamentals</span></div>
			<div class="iiha-cert__event-line iiha-cert__conducted"><span>Conducted on 13 March 2026</span></div>
			<div class="iiha-cert__event-line iiha-cert__hours"><span>Total Contact Hours: 16 Hours</span></div>
		</div>

		<div class="iiha-cert__verify">
			<img class="iiha-cert__verify-qr" src="qr-code.png" alt="Certificate Verification QR">
		</div>
		<div class="iiha-cert__number">Certificate No: IIHA-2026-0001</div>
	</div>
</body>
</html>
